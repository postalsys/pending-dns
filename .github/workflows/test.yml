name: Run Tests

on:
    push:
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # Skip CI for release-please's auto-generated release PR / branch: it only bumps the
    # version + CHANGELOG (no code change), so re-running the suite is wasted work.
    license_check:
        name: License Compliance Check
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm install
            - name: Run License Checks
              run: npm run licenses

    lint:
        name: Lint
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm install
            - name: Run ESLint
              run: npm run lint

    unit:
        name: Unit Tests
        if: ${{ !startsWith(github.ref_name, 'release-please--') && !startsWith(github.head_ref, 'release-please--') }}
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        services:
            redis:
                image: redis
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports:
                    - 6379:6379
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js 24
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm install
            - name: Run tests
              run: npm test
              env:
                  NODE_ENV: test
